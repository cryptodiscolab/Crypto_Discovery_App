name: Autonomous Ecosystem Sentinel (Cron)

on:
  schedule:
    # Berjalan otomatis setiap hari pada jam 00:00 UTC
    - cron: '0 0 * * *'
  # Memungkinkan Anda men-trigger script secara manual kapan saja dari tab Actions
  workflow_dispatch:

jobs:
  audit-and-sync:
    name: Run Sentinel Audit
    runs-on: ubuntu-latest

    # Set default working-directory ke root repository agar semua path relatif konsisten
    defaults:
      run:
        working-directory: .

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Raffle_Frontend/package-lock.json

      - name: 📦 Install Frontend Dependencies
        run: npm ci --prefer-offline
        working-directory: Raffle_Frontend

      - name: 🕵️‍♂️ Run Security & UI Audit (Sentinel)
        run: node .agents/skills/ecosystem-sentinel/scripts/sentinel-audit.js
        # Script dijalankan dari ROOT REPO agar path resolving konsisten
        # sentinel-audit.js menggunakan path.resolve(__dirname, '../../../../') = root repo
        env:
          NODE_ENV: ci

      # Cloud Sync ke Supabase Storage (backup .agents/skills & .cursorrules)
      - name: ☁️ Sync Skills to Supabase Storage
        run: node .agents/skills/ecosystem-sentinel/scripts/sync-cloud.js
        continue-on-error: true  # Jika cloud sync gagal, audit tetap tercatat sukses
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
