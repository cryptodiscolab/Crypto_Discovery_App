name: Database Backup (Cron)

on:
  schedule:
    # Runs daily at 05:00 UTC (12:00 WIB)
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  backup:
    name: Trigger Database Backup
    runs-on: ubuntu-latest
    steps:
      - name: Hit Endpoint with Auto-Retry
        run: |
          MAX_ATTEMPTS=3
          RETRY_WAIT=60
          attempt=1
          
          while [ $attempt -le $MAX_ATTEMPTS ]; do
            echo "Memanggil Backup Endpoint (Percobaan $attempt/$MAX_ATTEMPTS)..."
            RESPONSE_FILE=$(mktemp)
            HTTP_STATUS=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              --max-time 30 \
              "https://crypto-discovery-app.vercel.app/api/cron/backup")
            
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Backup berhasil dieksekusi!"
              echo "📄 Response Body:"
              cat "$RESPONSE_FILE"
              rm "$RESPONSE_FILE"
              exit 0
            else
              echo "❌ API gagal dengan status $HTTP_STATUS"
              echo "📄 Full Response Body:"
              cat "$RESPONSE_FILE"
              rm "$RESPONSE_FILE"
              
              if [ $attempt -lt $MAX_ATTEMPTS ]; then
                echo "Menunggu ${RETRY_WAIT} detik sebelum mencoba lagi..."
                sleep $RETRY_WAIT
              fi
            fi
            attempt=$((attempt + 1))
          done
          
          echo "❌ Semua percobaan gagal setelah $MAX_ATTEMPTS kali."
          exit 1