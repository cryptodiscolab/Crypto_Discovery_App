name: 30-Minute XP Sync (Cron)

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync_xp:
    name: Sync User XP to On-chain
    runs-on: ubuntu-latest
    steps:
      - name: Hit Endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl -sS -X GET -H "Authorization: Bearer $CRON_SECRET" "https://crypto-discovery-app.vercel.app/api/sync-xp-onchain"
          else
            curl -sS -X GET "https://crypto-discovery-app.vercel.app/api/sync-xp-onchain"
          fi
