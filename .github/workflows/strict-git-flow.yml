name: Strict Git Flow

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-policy:
    name: Branch and PR Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enforce strict Git Flow
        run: node scripts/audits/git_flow_guard.cjs --ci-pr

  required-tests:
    name: Required Tests
    runs-on: ubuntu-latest
    needs: branch-policy
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies safely
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies safely
        working-directory: Raffle_Frontend
        run: npm ci --ignore-scripts

      - name: Run required pre-merge suite
        run: npm run test:all
