name: 5-Minute Event Sync (Cron)

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync_events:
    name: Sync Blockchain Events to Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Hit Endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl -sS -X GET -H "Authorization: Bearer $CRON_SECRET" "https://crypto-discovery-app.vercel.app/api/cron/sync-events"
          else
            curl -sS -X GET "https://crypto-discovery-app.vercel.app/api/cron/sync-events"
          fi
