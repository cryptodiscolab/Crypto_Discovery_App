name: Lurah Live Sentinel (Cron Fallback)

on:
  schedule:
    # Jalan setiap jam di menit ke-15 untuk menghindari tabrakan dengan cron lain yang jalan di menit 0
    - cron: '15 * * * *' 
  workflow_dispatch: # Memungkinkan eksekusi manual dari tab Actions

jobs:
  ping-lurah-api:
    name: Trigger Lurah Vercel API
    runs-on: ubuntu-latest
    steps:
      - name: Trigger API with Auto-Retry
        run: |
          MAX_ATTEMPTS=3
          RETRY_WAIT=60
          attempt=1
          
          while [ $attempt -le $MAX_ATTEMPTS ]; do
            echo "Memanggil Endpoint Lurah (Percobaan $attempt/$MAX_ATTEMPTS)..."
            RESPONSE_FILE=$(mktemp)
            HTTP_STATUS=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" --max-time 30 "https://crypto-discovery-app.vercel.app/api/lurah-cron")
            
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Lurah Audit berhasil dieksekusi!"
              echo "📄 Response Body:"
              cat "$RESPONSE_FILE"
              rm "$RESPONSE_FILE"
              exit 0
            else
              echo "❌ Lurah API gagal dengan status $HTTP_STATUS"
              echo "📄 Full Response Body:"
              cat "$RESPONSE_FILE"
              rm "$RESPONSE_FILE"
              
              if [ $attempt -lt $MAX_ATTEMPTS ]; then
                echo "Menunggu ${RETRY_WAIT} detik sebelum mencoba lagi..."
                sleep $RETRY_WAIT
              fi
            fi
            attempt=$((attempt + 1))
          done
          
          echo "❌ Semua percobaan gagal setelah $MAX_ATTEMPTS kali."
          exit 1

