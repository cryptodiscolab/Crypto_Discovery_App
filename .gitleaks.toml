# Gitleaks Configuration

[allowlist]
description = "Global allowlist"
paths = [
    '''node_modules''',
    '''package-lock.json''',
    '''artifacts''',
    '''cache''',
    '''tools/nexus-monitor''',
    '''\.gitleaks\.toml$'''
]

[[rules]]
    id = "generic-api-key"
    description = "Generic API Key"
    regex = '''(?i)(?:key|api|token|secret|client|passwd|password)[=:]\s*(?:['"]?[0-9a-zA-Z]{16,40}['"]?)'''
    entropy = 3.5
    keywords = ["key", "api", "token", "secret", "client", "passwd", "password"]

[[rules]]
    id = "ethereum-private-key"
    description = "Ethereum Private Key"
    regex = '''(?:^|[^a-fA-F0-9])[a-fA-F0-9]{64}(?:[^a-fA-F0-9]|$)'''
    keywords = ["key", "private", "secret"]

[[rules]]
    id = "env-file-leak"
    description = "Environment File Leak"
    regex = '''\.env.*'''
    path = '''\.env.*'''

[[rules]]
    id = "forbidden-media-files"
    description = "Detected forbidden media file (screenshot/recording). Media files are strictly prohibited in this repository per Section 27 of .cursorrules."
    regex = '''(?i)\.(?:png|jpg|jpeg|webp|gif|mp4|mov|avi)$'''
    path = '''(?i)\.(?:png|jpg|jpeg|webp|gif|mp4|mov|avi)$'''

[[rules]]
    id = "supabase-role-key"
    description = "Detected Supabase Service Role Key or equivalent. High risk of full database compromise."
    regex = '''(?i)(?:role[_-]key|service[_-]role|service_role_key)[=:]\s*(?:['"]?[0-9a-zA-Z]{50,200}['"]?)'''
    keywords = ["role_key", "service_role", "role-key"]

[[rules]]
    id = "generic-secret-leak"
    description = "Detected generic secret or sensitive credential tag."
    regex = '''(?i)(?:secret|api_secret|jwt_secret|app_secret|private_key)[=:]\s*(?:['"]?[0-9a-zA-Z]{16,200}['"]?)'''
    keywords = ["secret", "private_key", "jwt_secret"]

[[rules]]
    id = "sensitive-file-leak"
    description = "Detected attempt to commit sensitive file types (.key, .pem, .p12, .txt secrets)."
    path = '''(?i)\.(?:key|pem|p12|cert|secret\.txt)$'''

[[rules]]
    id = "database-dump-leak"
    description = "Forbidden Database Dump: Committing database snapshots (JSON/SQL) is strictly prohibited to prevent PII exposure and repo bloating."
    path = '''(?i)(?:supabase_full_dump\.json|full_supabase_dump\.sql)$'''

[[rules]]
    id = "ecosystem-log-leak"
    description = "Forbidden Activity/History Log: Committing large ecosystem activity logs or bridge history metadata is prohibited."
    path = '''(?i)(?:nexus-activity\.json|nexus-bridge\.json|history_.*\.json)$'''
