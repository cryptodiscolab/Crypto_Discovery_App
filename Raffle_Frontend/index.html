  <!-- Safe Provider Boot: Prevent window.ethereum from being trapped as a read-only getter by greedy extensions -->
  <script>
    (function() {
      // 🛡️ Global & Buffer Polyfills for Web3 Libraries
      window.global = window;
      window.process = window.process || { env: {} };
      
      try {
        let currentProvider = window.ethereum;
        // Attempt to "unlock" the property if it's currently a non-writable getter
        Object.defineProperty(window, 'ethereum', {
          get: function() { return currentProvider; },
          set: function(val) { 
            // Only update if the new value is actually truthy (don't let extensions null it out easily)
            if (val) currentProvider = val;
          },
          configurable: true,
          enumerable: true
        });
        console.log('%c[SafeBoot] Provider proxy active. Slot is now writable.', 'color: #4ade80; font-weight: bold;');
      } catch (e) {
        console.warn('[SafeBoot] Primary unlock failed, attempting fallback...', e.message);
        // Fallback: If defineProperty fails, try to at least ensure it's not a read-only trap
        try {
          delete window.ethereum;
          window.ethereum = undefined;
        } catch (inner) {
          console.error('[SafeBoot] Critical failure: window.ethereum is locked by another extension.');
        }
      }
    })();
  </script>
